<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بازی پرش (نسخه اتمی)</title>
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Tahoma, sans-serif;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #facc15;
        }
        canvas {
            background: #f8fafc;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            cursor: pointer;
            width: 600px;
            height: 350px;
        }
        .info {
            color: white;
            font-size: 18px;
            margin-top: 15px;
        }
        button {
            background: #facc15;
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .footer {
            color: #94a3b8;
            margin-top: 15px;
            font-size: 13px;
        }
        .footer a {
            color: #facc15;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="box">
    <canvas id="c" width="600" height="350"></canvas>
    <div class="info">
        امتیاز: <span id="s">0</span> &nbsp;|&nbsp; 👑 رکورد: <span id="h">0</span>
    </div>
    <button onclick="reset()">🔄 دوباره</button>
    <div class="footer">
        ✦ ساخته شده توسط <strong>محمد حسین حبیبی راد</strong> ✦<br>
        📺 <a href="https://eitaa.com/irandigital_python" target="_blank">کانال من در ایتا</a>
    </div>
</div>
<script>
    // =================== عناصر ===================
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('s');
    const highSpan = document.getElementById('h');

    // =================== تنظیمات ===================
    const GROUND = 320;        // ارتفاع زمین
    const GRAVITY = 0.5;
    const JUMP = -10;

    // =================== متغیرها ===================
    let player = { x: 60, y: GROUND - 35, w: 28, h: 35, vy: 0, jump: false };
    let obstacles = [];
    let score = 0;
    let gameOver = false;
    let speed = 4;
    let frame = 0;
    let highScore = 0;

    // =================== رکورد ===================
    function loadHigh() {
        let saved = localStorage.getItem('jumpHigh');
        if (saved) highScore = parseInt(saved);
        highSpan.innerText = highScore;
    }
    function saveHigh() {
        localStorage.setItem('jumpHigh', String(highScore));
    }

    // =================== ریست ===================
    function reset() {
        player.y = GROUND - 35;
        player.vy = 0;
        player.jump = false;
        obstacles = [];
        score = 0;
        gameOver = false;
        speed = 4;
        frame = 0;
        scoreSpan.innerText = '0';
    }

    // =================== پرش ===================
    function jump() {
        if (gameOver) return;
        if (player.y >= GROUND - 35 - 1) {
            player.vy = JUMP;
            player.jump = true;
        }
    }

    // =================== برخورد ===================
    function collide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x &&
               a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // =================== تولید مانع ===================
    function makeObs(x) {
        // اندازه‌های مختلف
        let sizes = [
            { w: 18, h: 28 },  // کوتاه
            { w: 22, h: 38 },  // متوسط
            { w: 26, h: 48 }   // بلند
        ];
        let s = sizes[Math.floor(Math.random() * sizes.length)];
        return { x: x, y: GROUND - s.h, w: s.w, h: s.h };
    }

    // =================== حلقه اصلی ===================
    function update() {
        if (gameOver) return;

        // 1. سرعت متغیر (بدون محدودیت)
        speed = 4 + Math.floor(score / 8);
        if (speed > 25) speed = 25;

        // 2. جاذبه
        player.vy += GRAVITY;
        player.y += player.vy;
        if (player.y >= GROUND - 35) {
            player.y = GROUND - 35;
            player.vy = 0;
            player.jump = false;
        }

        // 3. حرکت موانع
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= speed;

            if (o.x + o.w < 0) {
                obstacles.splice(i, 1);
                if (!gameOver) {
                    score++;
                    scoreSpan.innerText = score;
                }
                continue;
            }

            if (collide(player, o)) {
                gameOver = true;
                if (score > highScore) {
                    highScore = score;
                    saveHigh();
                    highSpan.innerText = highScore;
                }
                return;
            }
        }

        // 4. تولید موانع (هم تکی و هم چندتایی)
        frame++;
        let delay = Math.max(20, 60 - Math.floor(score / 2));
        if (frame >= delay) {
            frame = 0;
            let count = (Math.random() < 0.6) ? (2 + Math.floor(Math.random() * 3)) : 1;
            for (let i = 0; i < count; i++) {
                let x = canvas.width + i * 45 + Math.random() * 30;
                obstacles.push(makeObs(x));
            }
        }
    }

    // =================== رسم ===================
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // زمین
        ctx.fillStyle = '#d6d3d1';
        ctx.fillRect(0, GROUND, canvas.width, 30);
        ctx.fillStyle = '#84cc16';
        ctx.fillRect(0, GROUND - 3, canvas.width, 6);

        // بازیکن
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = 'white';
        ctx.fillRect(player.x + 14, player.y + 5, 10, 10);
        ctx.fillStyle = 'black';
        ctx.fillRect(player.x + 18, player.y + 8, 5, 5);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x + 17, player.y + 20, 7, 0, Math.PI);
        ctx.stroke();
        if (player.jump) {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(player.x + 2, player.y + player.h, 8, 6);
            ctx.fillRect(player.x + player.w - 10, player.y + player.h, 8, 6);
        }

        // موانع
        for (let o of obstacles) {
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.fillStyle = '#15803d';
            for (let i = 0; i < o.h; i += 12) {
                ctx.fillRect(o.x + 3, o.y + 5 + i, o.w - 6, 3);
            }
            // خار
            ctx.fillStyle = '#14532d';
            ctx.fillRect(o.x - 3, o.y + 10, 4, 3);
            ctx.fillRect(o.x + o.w - 1, o.y + 10, 4, 3);
        }

        // Game Over
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#facc15';
            ctx.font = 'bold 40px Tahoma';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('💥 بازی تمام شد!', canvas.width / 2, canvas.height / 2 - 30);
            ctx.fillStyle = 'white';
            ctx.font = '24px Tahoma';
            ctx.fillText('امتیاز: ' + score, canvas.width / 2, canvas.height / 2 + 40);
        }

        // سرعت
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.font = '13px Tahoma';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('سرعت: ' + speed, 10, 10);
    }

    // =================== حلقه ===================
    setInterval(function() {
        update();
        draw();
    }, 1000 / 60);

    // =================== رویدادها ===================
    canvas.onclick = jump;
    canvas.ontouchstart = function(e) { e.preventDefault(); jump(); };
    document.onkeydown = function(e) {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            jump();
        }
    };

    // =================== شروع ===================
    loadHigh();
    reset();
</script>
</body>
</html>
